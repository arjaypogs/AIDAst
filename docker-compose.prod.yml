# Production override — used by ./start.sh (default) and ./start.sh --lan
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Ports:
#   Frontend : ${FRONTEND_BIND:-127.0.0.1}:31337  (Nginx — localhost default, 0.0.0.0 with --lan)
#   Backend  : 127.0.0.1:8000 (same as dev, localhost-only — MCP clients on host still work)
#   Postgres : 127.0.0.1:5432 (unchanged)

services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Injected by start.sh --lan — includes LAN IP + localhost variants on port 31337
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:31337,http://127.0.0.1:31337}"
      ENVIRONMENT: production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:31337:80"
    environment: {}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
