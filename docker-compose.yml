services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aso_postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aso}
      POSTGRES_DB: ${POSTGRES_DB:-aso_assessments}
    ports:
      # Bind to localhost only — the database must never be reachable from
      # the LAN. The backend talks to postgres over the internal docker
      # network, so this mapping only exists for host-side dev tools (psql,
      # pgAdmin, DBeaver). Remove the line entirely to lock it down further.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aso-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aso} -d ${POSTGRES_DB:-aso_assessments}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    image: vasco0x4/aso-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aso_backend
    env_file:
      - backend/.env
    environment:
      # DB_HOST is set by switch-db.sh in root .env (default: postgres)
      POSTGRES_HOST: ${DB_HOST:-postgres}
      POSTGRES_DB: ${DB_NAME:-aso_assessments}
      # Set to 'development' by start.sh --dev for hot reload
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      # Bind to localhost only — the API must not be reachable from the LAN.
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount source code for hot reload (exclude venv to avoid conflicts)
      # :z flag enables SELinux compatibility (RHEL/Fedora)
      - ./backend:/app:z
      - /app/venv
      # Mount Docker socket to allow backend to execute docker commands
      # SECURITY NOTE: This gives the backend container access to the Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount logs directory with SELinux flag
      - ./backend/logs:/app/logs:z
    networks:
      - aso-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    image: vasco0x4/aso-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aso_frontend
    environment:
      # Frontend talks to backend via localhost (browser runs on host)
      VITE_API_URL: http://localhost:8000/api
    ports:
      # Bind to localhost only — the dev server must not be reachable from the LAN.
      - "127.0.0.1:5173:5173"
    volumes:
      # Mount source code for hot reload (exclude node_modules to avoid conflicts)
      # :z flag enables SELinux compatibility (RHEL/Fedora)
      - ./frontend:/app:z
      - /app/node_modules
    networks:
      - aso-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ASO Pentest Container
  # Lightweight execution environment for AI-driven assessments.
  # The backend connects to this container via Docker socket (docker exec).
  aso-pentest:
    image: vasco0x4/aso-pentest:latest
    build:
      context: ./pentest
      dockerfile: Dockerfile
    container_name: aso-pentest
    tty: true
    stdin_open: true
    volumes:
      # Workspace bind mount — same /workspace path as Exegol.
      # workspace_service.py discovers this path via docker inspect, so the
      # host path resolution in aso.py continues to work without changes.
      - ${HOME}/.aso/workspaces:/workspace
    networks:
      - aso-network
    restart: unless-stopped

networks:
  aso-network:
    name: aso-network
    driver: bridge

volumes:
  postgres_data:
    name: aso_postgres_data
